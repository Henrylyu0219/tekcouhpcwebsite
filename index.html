<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tekco Dual Roller</title>
<style>
  /* ➋ 品牌与尺寸变量（可改） */
  :root{
    --tek-blue:#1b2a82;
    --tek-brown:#634a39;
    --muted:#d9d9d9;
    --gap: clamp(16px, 3vw, 28px);
    --rail-w: min(320px, 35vw);
    --rail-h: clamp(220px, 40vh, 340px);
    --wrap-max: 1100px; /* 整体最大宽度 */
  }
  body{margin:0;background:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}
  .selector-wrap{
    display:grid;
    grid-template-columns: var(--rail-w) 1fr var(--rail-w);
    align-items:center;
    gap: var(--gap);
    width: min(var(--wrap-max), 92vw);
    margin: 0 auto;
    padding: clamp(12px, 3vw, 24px) 0;
    min-height: 80vh; /* 让组件在 iframe 内更“饱满” */
  }
  .roller{
    border:1px solid var(--muted);
    border-radius:14px;
    padding:12px;
    height: var(--rail-h);
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    background:#fff;
  }
  .roller-head{
    display:flex; justify-content:space-between; align-items:center;
    font-weight:700; letter-spacing:.3px; color:var(--tek-blue);
    padding:2px 4px 6px;
  }
  .roller-body{ position:relative; flex:1; overflow:hidden; margin:6px 0; }
  .roller-list{
    list-style:none; padding:0; margin:0;
    position:absolute; inset:0 0 auto 0;
    display:flex; flex-direction:column; gap:10px;
    transition: transform .28s ease;
  }
  .roller-item{
    text-align:center; padding:8px 6px;
    color:#333; font-weight:600; opacity:.7;
  }
  .roller-item.active{ color:var(--tek-brown); opacity:1; }
  .roller-controls{ display:flex; gap:10px; justify-content:center; }
  .btn{
    border:1px solid var(--muted);
    background:#fafafa; border-radius:10px;
    width:44px; height:36px; display:grid; place-items:center;
    cursor:pointer; transition: all .15s ease; user-select:none;
  }
  .btn:hover{ background:#fff; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .current-display{ text-align:center; line-height:1.3; padding: clamp(8px, 2vw, 14px); }
  .current-title{ font-size: clamp(18px, 2vw, 22px); color:#666; margin-bottom:10px; }
  .current-value{ font-size: clamp(28px, 4vw, 40px); font-weight:800; color:#111; margin-bottom:18px; }
  .current-sub{ font-size: clamp(16px, 1.6vw, 18px); color:#777; }

  @media (max-width: 860px){
    .selector-wrap{ grid-template-columns: 1fr; gap: 18px; min-height: auto; }
    .current-display{ order:-1; }
  }
</style>
</head>
<body>
<div class="selector-wrap" id="tecko-dual-roller">
  <!-- 左：Collections -->
  <div class="roller" data-roller="collections">
    <div class="roller-head">
      <span>Collections</span>
      <span class="roller-count" aria-live="polite"></span>
    </div>
    <div class="roller-body">
      <ul class="roller-list" role="list"></ul>
    </div>
    <div class="roller-controls">
      <button class="btn btn-up" aria-label="上一项">▲</button>
      <button class="btn btn-down" aria-label="下一项">▼</button>
    </div>
  </div>

  <!-- 中：显示区 -->
  <div class="current-display">
    <div class="current-title">Current Selection</div>
    <div class="current-value" id="current-main">—</div>
    <div class="current-sub" id="current-sub">—</div>
  </div>

  <!-- 右：Job References -->
  <div class="roller" data-roller="jobs">
    <div class="roller-head">
      <span>Job References</span>
      <span class="roller-count" aria-live="polite"></span>
    </div>
    <div class="roller-body">
      <ul class="roller-list" role="list"></ul>
    </div>
    <div class="roller-controls">
      <button class="btn btn-up" aria-label="上一项">▲</button>
      <button class="btn btn-down" aria-label="下一项">▼</button>
    </div>
  </div>
</div>

<script>
(function(){
  /* ➊ 在这里替换你的真实数据 */
  const collections = [
    "Raw Grey","Patch Wood","Shoji Paper","Travertine","Cloud","Damascus","Taklamakan"
  ];
  const jobs = [
    "Hilton Orchard Lobby","RWS Boutique","St. Regis Suite","Private Residence – Tanglin",
    "Boutique Café – Duxton","Airport Lounge T3","Showroom Feature Wall"
  ];

  const root = document.getElementById('tecko-dual-roller');
  const displayMain = root.querySelector('#current-main');
  const displaySub  = root.querySelector('#current-sub');

  const rollers = [
    { key:'collections', data:collections, index:0 },
    { key:'jobs',        data:jobs,        index:0 }
  ];

  rollers.forEach(setupRoller);
  updateDisplay();

  function setupRoller(r){
    const el  = root.querySelector(`.roller[data-roller="${r.key}"]`);
    const ul  = el.querySelector('.roller-list');
    const cnt = el.querySelector('.roller-count');

    ul.innerHTML = r.data.map((t,i)=>
      `<li class="roller-item ${i===0?'active':''}" data-i="${i}">${escapeHTML(t)}</li>`
    ).join('');

    cnt.textContent = `1 / ${r.data.length}`;

    el.querySelector('.btn-up').addEventListener('click',  ()=> step(r,-1, ul, cnt));
    el.querySelector('.btn-down').addEventListener('click', ()=> step(r, 1, ul, cnt));

    // 点击某一项直接跳到该项
    ul.addEventListener('click', (e)=>{
      const li = e.target.closest('.roller-item'); if(!li) return;
      r.index = +li.dataset.i;
      syncTransform(r, ul, cnt); updateDisplay();
    });

    syncTransform(r, ul, cnt);
  }

  function step(r, dir, ul, cnt){
    r.index = (r.index + dir + r.data.length) % r.data.length;
    syncTransform(r, ul, cnt);
    updateDisplay();
  }

  function syncTransform(r, ul, cnt){
    const first = ul.children[0];
    const itemH = first ? first.getBoundingClientRect().height : 28;
    ul.style.transform = `translateY(${-r.index * (itemH + 10)}px)`;
    [...ul.children].forEach((li,i)=>li.classList.toggle('active', i===r.index));
    cnt.textContent = `${r.index+1} / ${r.data.length}`;
  }

  function updateDisplay(){
    const curCol = rollers[0].data[rollers[0].index] || '—';
    const curJob = rollers[1].data[rollers[1].index] || '—';
    displayMain.textContent = curCol;
    displaySub.textContent  = curJob;
  }

  function escapeHTML(s){
    return s.replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
  }

  // 视口变化时重算位置
  let rAF;
  addEventListener('resize', ()=>{
    cancelAnimationFrame(rAF);
    rAF = requestAnimationFrame(()=>{
      rollers.forEach(r=>{
        const ul  = root.querySelector(`.roller[data-roller="${r.key}"] .roller-list`);
        const cnt = root.querySelector(`.roller[data-roller="${r.key}"] .roller-count`);
        syncTransform(r, ul, cnt);
      });
    });
  });
})();
</script>
</body>
</html>
